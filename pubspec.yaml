name: windows_gpu_recovery
description: >
  Flutter Windows plugin that recovers from EGL_CONTEXT_LOST / D3D11 device
  removed (DXGI_ERROR_DEVICE_REMOVED) after system sleep or GPU driver reset.
  Uses a sentinel D3D11 device for detection and a Vectored Exception Handler
  to safely destroy the dead engine and create a fresh one.
version: 0.1.0
publish_to: none

repository: https://github.com/user/windows_gpu_recovery
issue_tracker: https://github.com/user/windows_gpu_recovery/issues

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: WindowsGpuRecoveryPluginCApi
